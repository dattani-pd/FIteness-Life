  cupertino_icons: ^1.0.8
  path_provider:
  http:
  xml: ^6.6.1
  flutter_cube:
  firebase_core:
  firebase_auth:
  cloud_firestore:
  firebase_messaging:
  firebase_storage:
  firebase_functions:
  get:
  intl:
  rxdart:
  shared_preferences:
  shimmer: ^3.0.0
  #firebase_database:
  device_info_plus:
  url_launcher:
  flutter_stripe:
  get_storage:
  chewie:
  #youtube_player_flutter:
  carousel_slider:
  cached_network_image:
  crypto:
  mobile_scanner:
  #google_generative_ai: ^0.4.6
  image_picker:
